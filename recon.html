<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recon Platform - Enterprise Dealership Reconditioning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .status-badge { @apply px-3 py-1 rounded-full text-xs font-semibold; }
        .status-intake { @apply bg-blue-100 text-blue-800; }
        .status-inspected { @apply bg-purple-100 text-purple-800; }
        .status-in_recon { @apply bg-yellow-100 text-yellow-800; }
        .status-with_vendor { @apply bg-orange-100 text-orange-800; }
        .status-ready_for_qc { @apply bg-cyan-100 text-cyan-800; }
        .status-retail_ready { @apply bg-green-100 text-green-800; }
        .priority-urgent { @apply bg-red-500 text-white; }
        .priority-high { @apply bg-orange-500 text-white; }
        .priority-medium { @apply bg-yellow-500 text-white; }
        .priority-low { @apply bg-gray-500 text-white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API Configuration
        const API_URL = 'http://localhost:8001/api';
        const api = axios.create({ baseURL: API_URL });

        // Add auth token to requests
        api.interceptors.request.use(config => {
            const token = localStorage.getItem('token');
            if (token) config.headers.Authorization = `Bearer ${token}`;
            return config;
        });

        // ═══════════════════════════════════════════════════
        // MAIN APP COMPONENT
        // ═══════════════════════════════════════════════════

        function App() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');

            useEffect(() => {
                const storedUser = localStorage.getItem('user');
                if (storedUser) setUser(JSON.parse(storedUser));
            }, []);

            const handleLogin = (userData, token) => {
                setUser(userData);
                localStorage.setItem('user', JSON.stringify(userData));
                localStorage.setItem('token', token);
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('user');
                localStorage.removeItem('token');
            };

            if (!user) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* Top Navigation */}
                    <nav className="bg-gray-900 text-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <svg className="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                                </svg>
                                <h1 className="text-2xl font-bold">Recon Platform</h1>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-sm opacity-75">👤 {user.name}</span>
                                <button
                                    onClick={handleLogout}
                                    className="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-sm font-semibold transition-colors"
                                >
                                    Logout
                                </button>
                            </div>
                        </div>
                    </nav>

                    <div className="flex">
                        {/* Sidebar */}
                        <aside className="w-64 bg-white shadow-lg min-h-screen">
                            <nav className="p-4">
                                <MenuItem
                                    icon="📊"
                                    label="Dashboard"
                                    active={currentView === 'dashboard'}
                                    onClick={() => setCurrentView('dashboard')}
                                />
                                <MenuItem
                                    icon="🚗"
                                    label="Vehicle Intake"
                                    active={currentView === 'intake'}
                                    onClick={() => setCurrentView('intake')}
                                />
                                <MenuItem
                                    icon="📋"
                                    label="WIP Board"
                                    active={currentView === 'wip'}
                                    onClick={() => setCurrentView('wip')}
                                />
                                <MenuItem
                                    icon="🔧"
                                    label="Work Orders"
                                    active={currentView === 'work-orders'}
                                    onClick={() => setCurrentView('work-orders')}
                                />
                                <MenuItem
                                    icon="👥"
                                    label="Vendors"
                                    active={currentView === 'vendors'}
                                    onClick={() => setCurrentView('vendors')}
                                />
                                <MenuItem
                                    icon="✅"
                                    label="QC Inspection"
                                    active={currentView === 'qc'}
                                    onClick={() => setCurrentView('qc')}
                                />
                                <MenuItem
                                    icon="📈"
                                    label="Reports"
                                    active={currentView === 'reports'}
                                    onClick={() => setCurrentView('reports')}
                                />
                            </nav>
                        </aside>

                        {/* Main Content */}
                        <main className="flex-1 p-8">
                            {currentView === 'dashboard' && <Dashboard />}
                            {currentView === 'intake' && <VehicleIntake />}
                            {currentView === 'wip' && <WIPBoard />}
                            {currentView === 'work-orders' && <WorkOrders />}
                            {currentView === 'vendors' && <Vendors />}
                            {currentView === 'qc' && <QCInspection />}
                            {currentView === 'reports' && <Reports />}
                        </main>
                    </div>
                </div>
            );
        }

        function MenuItem({ icon, label, active, onClick }) {
            return (
                <button
                    onClick={onClick}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg mb-2 transition-colors ${
                        active
                            ? 'bg-blue-600 text-white'
                            : 'text-gray-700 hover:bg-gray-100'
                    }`}
                >
                    <span className="text-xl">{icon}</span>
                    <span className="font-medium">{label}</span>
                </button>
            );
        }

        // ═══════════════════════════════════════════════════
        // LOGIN SCREEN
        // ═══════════════════════════════════════════════════

        function LoginScreen({ onLogin }) {
            const [email, setEmail] = useState('demo@reconplatform.com');
            const [password, setPassword] = useState('demo123');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError('');

                // Demo mode - bypass API
                if (email === 'demo@reconplatform.com' && password === 'demo123') {
                    const demoUser = {
                        id: 1,
                        name: 'Demo User',
                        email: 'demo@reconplatform.com',
                        role: 'manager'
                    };
                    onLogin(demoUser, 'demo-token');
                    return;
                }

                try {
                    const response = await api.post('/auth/login', { email, password });
                    onLogin(response.data.user, response.data.access_token);
                } catch (err) {
                    setError('Invalid credentials. Use demo@reconplatform.com / demo123');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-900 to-gray-800 flex items-center justify-center p-6">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <svg className="w-16 h-16 mx-auto text-blue-600 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                            <h1 className="text-3xl font-bold text-gray-900">Recon Platform</h1>
                            <p className="text-gray-600 mt-2">Enterprise Reconditioning Management</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Email</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    required
                                />
                            </div>

                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                                    required
                                />
                            </div>

                            {error && (
                                <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg text-sm">
                                    {error}
                                </div>
                            )}

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition-colors disabled:opacity-50"
                            >
                                {loading ? 'Logging in...' : 'Login'}
                            </button>

                            <div className="bg-blue-50 border border-blue-200 rounded-lg p-4 text-sm text-blue-800">
                                <p className="font-semibold mb-1">Demo Credentials:</p>
                                <p>Email: demo@reconplatform.com</p>
                                <p>Password: demo123</p>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════
        // DASHBOARD
        // ═══════════════════════════════════════════════════

        function Dashboard() {
            const [stats, setStats] = useState({
                total_vehicles: 12,
                avg_days_in_recon: 4.2,
                total_estimated_cost: 48500,
                status_breakdown: {
                    intake: 2,
                    inspected: 1,
                    in_recon: 6,
                    with_vendor: 2,
                    ready_for_qc: 1
                }
            });

            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Dashboard</h1>

                    {/* KPI Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <KPICard
                            icon="🚗"
                            label="Vehicles in Recon"
                            value={stats.total_vehicles}
                            color="blue"
                        />
                        <KPICard
                            icon="⏱️"
                            label="Avg Days in Recon"
                            value={`${stats.avg_days_in_recon} days`}
                            color="green"
                            target="Target: ≤5 days"
                        />
                        <KPICard
                            icon="💰"
                            label="Total Estimated Cost"
                            value={`$${stats.total_estimated_cost.toLocaleString()}`}
                            color="purple"
                        />
                        <KPICard
                            icon="✅"
                            label="Ready for QC"
                            value={stats.status_breakdown.ready_for_qc}
                            color="orange"
                        />
                    </div>

                    {/* Status Breakdown */}
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <h2 className="text-xl font-bold mb-4">Status Breakdown</h2>
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                            <StatusCard label="Intake" count={stats.status_breakdown.intake} color="blue" />
                            <StatusCard label="Inspected" count={stats.status_breakdown.inspected} color="purple" />
                            <StatusCard label="In Recon" count={stats.status_breakdown.in_recon} color="yellow" />
                            <StatusCard label="With Vendor" count={stats.status_breakdown.with_vendor} color="orange" />
                            <StatusCard label="Ready for QC" count={stats.status_breakdown.ready_for_qc} color="cyan" />
                        </div>
                    </div>
                </div>
            );
        }

        function KPICard({ icon, label, value, color, target }) {
            const colors = {
                blue: 'bg-blue-500',
                green: 'bg-green-500',
                purple: 'bg-purple-500',
                orange: 'bg-orange-500'
            };

            return (
                <div className="bg-white rounded-xl shadow-lg p-6">
                    <div className="flex items-center gap-3 mb-3">
                        <div className={`w-12 h-12 ${colors[color]} rounded-lg flex items-center justify-center text-2xl`}>
                            {icon}
                        </div>
                        <div className="flex-1">
                            <p className="text-sm text-gray-600">{label}</p>
                            <p className="text-2xl font-bold text-gray-900">{value}</p>
                        </div>
                    </div>
                    {target && <p className="text-xs text-gray-500">{target}</p>}
                </div>
            );
        }

        function StatusCard({ label, count, color }) {
            const colors = {
                blue: 'bg-blue-100 text-blue-800',
                purple: 'bg-purple-100 text-purple-800',
                yellow: 'bg-yellow-100 text-yellow-800',
                orange: 'bg-orange-100 text-orange-800',
                cyan: 'bg-cyan-100 text-cyan-800'
            };

            return (
                <div className={`${colors[color]} rounded-lg p-4 text-center`}>
                    <p className="text-3xl font-bold">{count}</p>
                    <p className="text-sm font-semibold mt-1">{label}</p>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════
        // VEHICLE INTAKE
        // ═══════════════════════════════════════════════════

        function VehicleIntake() {
            const [formData, setFormData] = useState({
                vin: '',
                year: new Date().getFullYear(),
                make: '',
                model: '',
                mileage: '',
                exterior_color: '',
                interior_color: '',
                acquisition_source: 'trade',
                acquisition_cost: '',
                target_retail_price: '',
                priority: 'medium'
            });

            const handleSubmit = async (e) => {
                e.preventDefault();
                alert('Vehicle intake submitted!\n\nIn production, this would:\n1. Create vehicle record\n2. Generate stock number\n3. Trigger initial inspection workflow\n4. Update WIP board');
            };

            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Vehicle Intake</h1>

                    <div className="bg-white rounded-xl shadow-lg p-8">
                        <form onSubmit={handleSubmit} className="space-y-6">
                            <div className="grid grid-cols-2 gap-6">
                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">VIN *</label>
                                    <input
                                        type="text"
                                        value={formData.vin}
                                        onChange={(e) => setFormData({...formData, vin: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        maxLength={17}
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Year *</label>
                                    <input
                                        type="number"
                                        value={formData.year}
                                        onChange={(e) => setFormData({...formData, year: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Make *</label>
                                    <input
                                        type="text"
                                        value={formData.make}
                                        onChange={(e) => setFormData({...formData, make: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Model *</label>
                                    <input
                                        type="text"
                                        value={formData.model}
                                        onChange={(e) => setFormData({...formData, model: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Mileage *</label>
                                    <input
                                        type="number"
                                        value={formData.mileage}
                                        onChange={(e) => setFormData({...formData, mileage: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        required
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Priority</label>
                                    <select
                                        value={formData.priority}
                                        onChange={(e) => setFormData({...formData, priority: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                    >
                                        <option value="low">Low - Standard Turn</option>
                                        <option value="medium">Medium - Normal Priority</option>
                                        <option value="high">High - Quick Turn</option>
                                        <option value="urgent">Urgent - Rush</option>
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Acquisition Cost</label>
                                    <input
                                        type="number"
                                        value={formData.acquisition_cost}
                                        onChange={(e) => setFormData({...formData, acquisition_cost: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        placeholder="$"
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-semibold text-gray-700 mb-2">Target Retail Price</label>
                                    <input
                                        type="number"
                                        value={formData.target_retail_price}
                                        onChange={(e) => setFormData({...formData, target_retail_price: e.target.value})}
                                        className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                        placeholder="$"
                                    />
                                </div>
                            </div>

                            <button
                                type="submit"
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition-colors"
                            >
                                Create Vehicle Intake
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // ═══════════════════════════════════════════════════
        // WIP BOARD
        // ═══════════════════════════════════════════════════

        function WIPBoard() {
            const demoVehicles = [
                { id: 1, vin: '1HGBH41JXMN109186', year: 2021, make: 'Honda', model: 'Accord', status: 'intake', priority: 'high', days: 1, cost: 2500 },
                { id: 2, vin: '5FNRL6H76NB012345', year: 2022, make: 'Honda', model: 'Odyssey', status: 'inspected', priority: 'medium', days: 2, cost: 3200 },
                { id: 3, vin: '3VW2B7AJ5EM123456', year: 2020, make: 'Volkswagen', model: 'Passat', status: 'in_recon', priority: 'medium', days: 4, cost: 4100 },
                { id: 4, vin: '1FTFW1ET4BFA12345', year: 2019, make: 'Ford', model: 'F-150', status: 'with_vendor', priority: 'low', days: 6, cost: 5500 },
                { id: 5, vin: '5UXWX7C50D0D12345', year: 2023, make: 'BMW', model: 'X3', status: 'ready_for_qc', priority: 'urgent', days: 3, cost: 2800 }
            ];

            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">WIP Board</h1>

                    <div className="bg-white rounded-xl shadow-lg overflow-hidden">
                        <table className="w-full">
                            <thead className="bg-gray-50 border-b border-gray-200">
                                <tr>
                                    <th className="px-6 py-4 text-left text-sm font-semibold text-gray-700">Vehicle</th>
                                    <th className="px-6 py-4 text-left text-sm font-semibold text-gray-700">Status</th>
                                    <th className="px-6 py-4 text-left text-sm font-semibold text-gray-700">Priority</th>
                                    <th className="px-6 py-4 text-left text-sm font-semibold text-gray-700">Days in Recon</th>
                                    <th className="px-6 py-4 text-left text-sm font-semibold text-gray-700">Est. Cost</th>
                                    <th className="px-6 py-4 text-left text-sm font-semibold text-gray-700">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {demoVehicles.map(vehicle => (
                                    <tr key={vehicle.id} className="hover:bg-gray-50">
                                        <td className="px-6 py-4">
                                            <p className="font-semibold text-gray-900">{vehicle.year} {vehicle.make} {vehicle.model}</p>
                                            <p className="text-sm text-gray-500">{vehicle.vin}</p>
                                        </td>
                                        <td className="px-6 py-4">
                                            <span className={`status-badge status-${vehicle.status}`}>
                                                {vehicle.status.replace('_', ' ')}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4">
                                            <span className={`status-badge priority-${vehicle.priority}`}>
                                                {vehicle.priority}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4 text-gray-900 font-semibold">
                                            {vehicle.days} days
                                        </td>
                                        <td className="px-6 py-4 text-gray-900">
                                            ${vehicle.cost.toLocaleString()}
                                        </td>
                                        <td className="px-6 py-4">
                                            <button className="text-blue-600 hover:text-blue-800 font-semibold text-sm">
                                                View Details →
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // Placeholder components for other views
        function WorkOrders() {
            return <div><h1 className="text-3xl font-bold">Work Orders</h1><p className="mt-4 text-gray-600">Work order management interface would go here...</p></div>;
        }

        function Vendors() {
            return <div><h1 className="text-3xl font-bold">Vendors</h1><p className="mt-4 text-gray-600">Vendor management interface would go here...</p></div>;
        }

        function QCInspection() {
            return <div><h1 className="text-3xl font-bold">QC Inspection</h1><p className="mt-4 text-gray-600">Quality control inspection interface would go here...</p></div>;
        }

        function Reports() {
            return <div><h1 className="text-3xl font-bold">Reports & Analytics</h1><p className="mt-4 text-gray-600">Performance reports and analytics would go here...</p></div>;
        }

        // Render App
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
