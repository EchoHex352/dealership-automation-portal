<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F&I Processor - FinanceFlow AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API Configuration
        const API_URL = 'http://localhost:8900/api';
        const api = axios.create({ baseURL: API_URL });

        // Sample Data
        const SAMPLE_DEALS = [{"id": 1, "customer": "John Smith", "vehicle": "2024 Accord", "amount": "$32,450", "lenders": "5", "status": "Approved", "rate": "4.9%"}, {"id": 2, "customer": "Sarah Johnson", "vehicle": "2024 Camry", "amount": "$28,900", "lenders": "4", "status": "Pending", "rate": "TBD"}, {"id": 3, "customer": "Mike Davis", "vehicle": "2024 F-150", "amount": "$45,200", "lenders": "5", "status": "Stipulations", "rate": "5.2%"}, {"id": 4, "customer": "Emily Brown", "vehicle": "2024 CR-V", "amount": "$35,900", "lenders": "3", "status": "Approved", "rate": "4.7%"}];

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [data, setData] = useState(SAMPLE_DEALS);

            useEffect(() => {
                const storedUser = localStorage.getItem('user_8900');
                if (storedUser) setUser(JSON.parse(storedUser));
            }, []);

            const handleLogin = (userData, token) => {
                setUser(userData);
                localStorage.setItem('user_8900', JSON.stringify(userData));
                localStorage.setItem('token_8900', token);
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('user_8900');
                localStorage.removeItem('token_8900');
            };

            if (!user) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            return (
                <div className="min-h-screen bg-gray-50">
                    <nav className="bg-green-900 text-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="/index.html" className="text-green-300 hover:text-white transition text-sm">
                                    ← Back to Portal
                                </a>
                                <span className="text-gray-400">|</span>
                                <div className="flex items-center gap-2">
                                    <span className="text-2xl">🏦</span>
                                    <h1 className="text-xl font-bold">FinanceFlow AI</h1>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-sm opacity-75">👤 {user.name}</span>
                                <button
                                    onClick={handleLogout}
                                    className="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-sm font-semibold transition-colors"
                                >
                                    Logout
                                </button>
                            </div>
                        </div>
                    </nav>

                    <div className="flex">
                        <aside className="w-64 bg-white shadow-lg min-h-screen">
                            <nav className="p-4">
                                                            <MenuItem
                                icon="📊"
                                label="Dashboard"
                                active={currentView === 'dashboard'}
                                onClick={() => setCurrentView('dashboard')}
                            />
                            <MenuItem
                                icon="🤝"
                                label="Deals"
                                active={currentView === 'deals'}
                                onClick={() => setCurrentView('deals')}
                            />
                            <MenuItem
                                icon="🏦"
                                label="Lenders"
                                active={currentView === 'lenders'}
                                onClick={() => setCurrentView('lenders')}
                            />
                            <MenuItem
                                icon="✓"
                                label="Approvals"
                                active={currentView === 'approvals'}
                                onClick={() => setCurrentView('approvals')}
                            />
                            <MenuItem
                                icon="📈"
                                label="Reports"
                                active={currentView === 'reports'}
                                onClick={() => setCurrentView('reports')}
                            />

                            </nav>
                        </aside>

                        <main className="flex-1 p-8">
                            {currentView === 'dashboard' && <Dashboard data={data} />}
                            {currentView === 'deals' && <Deals data={data} />}
                            {currentView === 'lenders' && <Lenders data={data} />}
                            {currentView === 'approvals' && <Approvals data={data} />}
                            {currentView === 'reports' && <Reports data={data} />}
                            
                        </main>
                    </div>
                </div>
            );
        }

        // Login Screen
        function LoginScreen({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const userData = { name: username || 'Demo User', role: 'F&I Processor' };
                const token = 'demo-token-' + Date.now();
                onLogin(userData, token);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-green-900 to-green-700 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <span className="text-6xl">🏦</span>
                            <h1 className="text-3xl font-bold text-gray-900 mt-4">FinanceFlow AI</h1>
                            <p className="text-gray-600 mt-2">F&I Deal Processing</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500"
                                    placeholder="Enter username"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-green-500"
                                    placeholder="Enter password"
                                />
                            </div>
                            <button
                                type="submit"
                                className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-lg transition-colors"
                            >
                                Login to FinanceFlow AI
                            </button>
                        </form>
                        <p className="text-center text-sm text-gray-500 mt-6">
                            Demo Mode - Enter any credentials
                        </p>
                    </div>
                </div>
            );
        }

        // Menu Item Component
        function MenuItem({ icon, label, active, onClick, badge }) {
            return (
                <button
                    onClick={onClick}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors mb-2 ${
                        active ? 'bg-green-600 text-white' : 'text-gray-700 hover:bg-gray-100'
                    }`}
                >
                    <span className="text-xl">{icon}</span>
                    <span className="font-medium flex-1 text-left">{label}</span>
                    {badge && (
                        <span className={`px-2 py-1 rounded-full text-xs font-semibold ${
                            active ? 'bg-white text-green-600' : 'bg-green-100 text-green-600'
                        }`}>
                            {badge}
                        </span>
                    )}
                </button>
            );
        }

        // Dashboard View
        function Dashboard({ data }) {
            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Dashboard</h1>
                    
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <StatCard title="Deals Submitted" value="18" subtitle="Today" color="blue" />
                        <StatCard title="Approvals Received" value="14" subtitle="77.8% approval" color="green" />
                        <StatCard title="Pending Review" value="4" subtitle="Avg: 2.5 hours" color="purple" />
                        <StatCard title="Avg Reserve" value="$1,245" subtitle="Per deal" color="yellow" />
                        
                    </div>

                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <h2 className="text-xl font-bold text-gray-900 mb-6">Recent Activity</h2>
                        <div className="space-y-4">
                            {data.slice(0, 5).map(item => (
                                <div key={item.id} className="p-4 bg-gray-50 rounded-lg hover:bg-gray-100 cursor-pointer transition">
                                    <p className="font-semibold text-gray-900">{item.name || item.customer || item.title}</p>
                                    <p className="text-sm text-gray-600">{item.description || item.status}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        
        function Deals({ data }) {
            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Deals</h1>
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <p className="text-gray-600">Full deals interface would be displayed here...</p>
                    </div>
                </div>
            );
        }

        function Lenders({ data }) {
            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Lenders</h1>
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <p className="text-gray-600">Full lenders interface would be displayed here...</p>
                    </div>
                </div>
            );
        }

        function Approvals({ data }) {
            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Approvals</h1>
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <p className="text-gray-600">Full approvals interface would be displayed here...</p>
                    </div>
                </div>
            );
        }

        function Reports({ data }) {
            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Reports</h1>
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <p className="text-gray-600">Full reports interface would be displayed here...</p>
                    </div>
                </div>
            );
        }


        // Helper Components
        function StatCard({ title, value, subtitle, color }) {
            const colors = {
                blue: 'from-blue-500 to-blue-600',
                green: 'from-green-500 to-green-600',
                purple: 'from-purple-500 to-purple-600',
                yellow: 'from-yellow-500 to-yellow-600',
                cyan: 'from-cyan-500 to-cyan-600',
                indigo: 'from-indigo-500 to-indigo-600',
                teal: 'from-teal-500 to-teal-600',
                pink: 'from-pink-500 to-pink-600',
                red: 'from-red-500 to-red-600',
                orange: 'from-orange-500 to-orange-600'
            };

            return (
                <div className={`bg-gradient-to-br ${colors[color]} text-white rounded-xl shadow-lg p-6`}>
                    <p className="text-sm opacity-90 mb-2">{title}</p>
                    <p className="text-3xl font-bold mb-1">{value}</p>
                    <p className="text-sm opacity-75">{subtitle}</p>
                </div>
            );
        }

        // Render
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
