<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Specialist - CollectPro AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API Configuration
        const API_URL = 'http://localhost:8700/api';
        const api = axios.create({ baseURL: API_URL });

        // Sample Data
        const SAMPLE_INVOICES = [{"id": 1, "customer": "ABC Company", "invoice": "#12345", "amount": "$5,670", "due": "Mar 1", "days": "17", "status": "Contacted"}, {"id": 2, "customer": "XYZ Corp", "invoice": "#12346", "amount": "$8,920", "due": "Feb 28", "days": "19", "status": "Pending"}, {"id": 3, "customer": "Smith Auto", "invoice": "#12347", "amount": "$3,450", "due": "Mar 5", "days": "13", "status": "Promised"}, {"id": 4, "customer": "Jones Motors", "invoice": "#12348", "amount": "$12,340", "due": "Feb 15", "days": "32", "status": "Escalated"}];

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [data, setData] = useState(SAMPLE_INVOICES);

            useEffect(() => {
                const storedUser = localStorage.getItem('user_8700');
                if (storedUser) setUser(JSON.parse(storedUser));
            }, []);

            const handleLogin = (userData, token) => {
                setUser(userData);
                localStorage.setItem('user_8700', JSON.stringify(userData));
                localStorage.setItem('token_8700', token);
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('user_8700');
                localStorage.removeItem('token_8700');
            };

            if (!user) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            return (
                <div className="min-h-screen bg-gray-50">
                    <nav className="bg-pink-900 text-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="/index.html" className="text-pink-300 hover:text-white transition text-sm">
                                    ← Back to Portal
                                </a>
                                <span className="text-gray-400">|</span>
                                <div className="flex items-center gap-2">
                                    <span className="text-2xl">💵</span>
                                    <h1 className="text-xl font-bold">CollectPro AI</h1>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-sm opacity-75">👤 {user.name}</span>
                                <button
                                    onClick={handleLogout}
                                    className="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-sm font-semibold transition-colors"
                                >
                                    Logout
                                </button>
                            </div>
                        </div>
                    </nav>

                    <div className="flex">
                        <aside className="w-64 bg-white shadow-lg min-h-screen">
                            <nav className="p-4">
                                                            <MenuItem
                                icon="📊"
                                label="Dashboard"
                                active={currentView === 'dashboard'}
                                onClick={() => setCurrentView('dashboard')}
                            />
                            <MenuItem
                                icon="📄"
                                label="Invoices"
                                active={currentView === 'invoices'}
                                onClick={() => setCurrentView('invoices')}
                            />
                            <MenuItem
                                icon="💵"
                                label="Collections"
                                active={currentView === 'collections'}
                                onClick={() => setCurrentView('collections')}
                            />
                            <MenuItem
                                icon="⏰"
                                label="Aging"
                                active={currentView === 'aging'}
                                onClick={() => setCurrentView('aging')}
                            />
                            <MenuItem
                                icon="📈"
                                label="Reports"
                                active={currentView === 'reports'}
                                onClick={() => setCurrentView('reports')}
                            />

                            </nav>
                        </aside>

                        <main className="flex-1 p-8">
                            {currentView === 'dashboard' && <Dashboard data={data} />}
                            {currentView === 'invoices' && <Invoices data={data} />}
                            {currentView === 'collections' && <Collections data={data} />}
                            {currentView === 'aging' && <Aging data={data} />}
                            {currentView === 'reports' && <Reports data={data} />}
                            
                        </main>
                    </div>
                </div>
            );
        }

        // Login Screen
        function LoginScreen({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const userData = { name: username || 'Demo User', role: 'AR Specialist' };
                const token = 'demo-token-' + Date.now();
                onLogin(userData, token);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-pink-900 to-pink-700 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <span className="text-6xl">💵</span>
                            <h1 className="text-3xl font-bold text-gray-900 mt-4">CollectPro AI</h1>
                            <p className="text-gray-600 mt-2">Accounts Receivable Management</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500"
                                    placeholder="Enter username"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-pink-500"
                                    placeholder="Enter password"
                                />
                            </div>
                            <button
                                type="submit"
                                className="w-full bg-pink-600 hover:bg-pink-700 text-white font-bold py-4 rounded-lg transition-colors"
                            >
                                Login to CollectPro AI
                            </button>
                        </form>
                        <p className="text-center text-sm text-gray-500 mt-6">
                            Demo Mode - Enter any credentials
                        </p>
                    </div>
                </div>
            );
        }

        // Menu Item Component
        function MenuItem({ icon, label, active, onClick, badge }) {
            return (
                <button
                    onClick={onClick}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors mb-2 ${
                        active ? 'bg-pink-600 text-white' : 'text-gray-700 hover:bg-gray-100'
                    }`}
                >
                    <span className="text-xl">{icon}</span>
                    <span className="font-medium flex-1 text-left">{label}</span>
                    {badge && (
                        <span className={`px-2 py-1 rounded-full text-xs font-semibold ${
                            active ? 'bg-white text-pink-600' : 'bg-pink-100 text-pink-600'
                        }`}>
                            {badge}
                        </span>
                    )}
                </button>
            );
        }

        // Dashboard View
        function Dashboard({ data }) {
            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Dashboard</h1>
                    
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <StatCard title="Outstanding AR" value="$234,567" subtitle="↓ 12% from last month" color="blue" />
                        <StatCard title="Past Due > 30" value="$45,890" subtitle="18 accounts" color="green" />
                        <StatCard title="Collections Today" value="$12,450" subtitle="5 payments" color="purple" />
                        <StatCard title="Avg DSO" value="24 days" subtitle="Target: < 30" color="yellow" />
                        
                    </div>

                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <h2 className="text-xl font-bold text-gray-900 mb-6">Recent Activity</h2>
                        <div className="space-y-4">
                            {data.slice(0, 5).map(item => (
                                <div key={item.id} className="p-4 bg-gray-50 rounded-lg hover:bg-gray-100 cursor-pointer transition">
                                    <p className="font-semibold text-gray-900">{item.name || item.customer || item.title}</p>
                                    <p className="text-sm text-gray-600">{item.description || item.status}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        
        function Invoices({ data }) {
            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Invoices</h1>
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <p className="text-gray-600">Full invoices interface would be displayed here...</p>
                    </div>
                </div>
            );
        }

        function Collections({ data }) {
            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Collections</h1>
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <p className="text-gray-600">Full collections interface would be displayed here...</p>
                    </div>
                </div>
            );
        }

        function Aging({ data }) {
            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Aging</h1>
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <p className="text-gray-600">Full aging interface would be displayed here...</p>
                    </div>
                </div>
            );
        }

        function Reports({ data }) {
            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Reports</h1>
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <p className="text-gray-600">Full reports interface would be displayed here...</p>
                    </div>
                </div>
            );
        }


        // Helper Components
        function StatCard({ title, value, subtitle, color }) {
            const colors = {
                blue: 'from-blue-500 to-blue-600',
                green: 'from-green-500 to-green-600',
                purple: 'from-purple-500 to-purple-600',
                yellow: 'from-yellow-500 to-yellow-600',
                cyan: 'from-cyan-500 to-cyan-600',
                indigo: 'from-indigo-500 to-indigo-600',
                teal: 'from-teal-500 to-teal-600',
                pink: 'from-pink-500 to-pink-600',
                red: 'from-red-500 to-red-600',
                orange: 'from-orange-500 to-orange-600'
            };

            return (
                <div className={`bg-gradient-to-br ${colors[color]} text-white rounded-xl shadow-lg p-6`}>
                    <p className="text-sm opacity-90 mb-2">{title}</p>
                    <p className="text-3xl font-bold mb-1">{value}</p>
                    <p className="text-sm opacity-75">{subtitle}</p>
                </div>
            );
        }

        // Render
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
