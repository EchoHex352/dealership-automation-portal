<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDC Agent - AutoBDC AI Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .status-badge { @apply px-3 py-1 rounded-full text-xs font-semibold; }
        .status-new { @apply bg-yellow-100 text-yellow-800; }
        .status-contacted { @apply bg-blue-100 text-blue-800; }
        .status-appointment_set { @apply bg-green-100 text-green-800; }
        .status-sold { @apply bg-purple-100 text-purple-800; }
        .status-lost { @apply bg-red-100 text-red-800; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API Configuration
        const API_URL = 'http://localhost:8000/api';
        const api = axios.create({ baseURL: API_URL });

        // Sample Data
        const SAMPLE_LEADS = [
            {
                id: 1,
                name: 'John Smith',
                email: 'john.smith@email.com',
                phone: '(555) 123-4567',
                source: 'Website',
                interest: '2024 Honda Accord',
                status: 'new',
                priority: 'high',
                lastContact: '5 minutes ago',
                created: '2026-03-18T10:30:00',
                notes: 'Interested in test drive this weekend. Prefers Saturday morning.',
                conversation: [
                    { sender: 'customer', message: "Hi, I'm interested in the 2024 Honda Accord. What's your best price?", time: '10:30 AM', date: 'Today' },
                    { sender: 'ai', message: "Hello John! Thank you for your interest in the 2024 Accord Sport. The MSRP is $32,450 and we currently have several in stock. Are you looking to trade in a vehicle?", time: '10:31 AM', date: 'Today' },
                    { sender: 'customer', message: "Yes, I have a 2019 Camry with 45k miles", time: '10:33 AM', date: 'Today' },
                    { sender: 'ai', message: "Great! A 2019 Camry with that mileage typically trades for $18,000-$20,000. Would you like to schedule a test drive so we can provide an accurate appraisal?", time: '10:34 AM', date: 'Today' }
                ]
            },
            {
                id: 2,
                name: 'Sarah Johnson',
                email: 'sarah.j@email.com',
                phone: '(555) 234-5678',
                source: 'Phone Call',
                interest: '2024 Toyota Camry',
                status: 'contacted',
                priority: 'medium',
                lastContact: '1 hour ago',
                created: '2026-03-18T09:00:00',
                notes: 'Appointment scheduled for tomorrow at 2:00 PM. Confirmed via email.',
                conversation: [
                    { sender: 'customer', message: 'Do you have any Camry in stock?', time: '9:00 AM', date: 'Today' },
                    { sender: 'ai', message: 'Yes! We have 5 Camry models available, including the popular XSE and Hybrid models. What features are most important to you?', time: '9:01 AM', date: 'Today' }
                ]
            },
            {
                id: 3,
                name: 'Mike Davis',
                email: 'mdavis@email.com',
                phone: '(555) 345-6789',
                source: 'Facebook Ad',
                interest: '2024 Ford F-150',
                status: 'appointment_set',
                priority: 'high',
                lastContact: '3 hours ago',
                created: '2026-03-17T16:00:00',
                notes: 'Test drive confirmed for Thursday at 10:00 AM. Interested in XLT trim.',
                conversation: []
            },
            {
                id: 4,
                name: 'Emily Brown',
                email: 'emily.brown@email.com',
                phone: '(555) 456-7890',
                source: 'AutoTrader',
                interest: '2024 Chevrolet Silverado',
                status: 'new',
                priority: 'medium',
                lastContact: '10 minutes ago',
                created: '2026-03-18T10:20:00',
                notes: 'Requested pricing information and available colors.',
                conversation: []
            }
        ];

        // Main App Component
        function App() {
            const [user, setUser] = useState(null);
            const [currentView, setCurrentView] = useState('dashboard');
            const [leads, setLeads] = useState(SAMPLE_LEADS);
            const [selectedLead, setSelectedLead] = useState(null);
            const [showLeadModal, setShowLeadModal] = useState(false);

            useEffect(() => {
                const storedUser = localStorage.getItem('user');
                if (storedUser) setUser(JSON.parse(storedUser));
            }, []);

            const handleLogin = (userData, token) => {
                setUser(userData);
                localStorage.setItem('user', JSON.stringify(userData));
                localStorage.setItem('token', token);
            };

            const handleLogout = () => {
                setUser(null);
                localStorage.removeItem('user');
                localStorage.removeItem('token');
            };

            if (!user) {
                return <LoginScreen onLogin={handleLogin} />;
            }

            return (
                <div className="min-h-screen bg-gray-50">
                    <nav className="bg-blue-900 text-white shadow-lg">
                        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
                            <div className="flex items-center gap-4">
                                <a href="/index.html" className="text-blue-300 hover:text-white transition text-sm">
                                    ← Back to Portal
                                </a>
                                <span className="text-gray-400">|</span>
                                <div className="flex items-center gap-2">
                                    <span className="text-2xl">📞</span>
                                    <h1 className="text-xl font-bold">AutoBDC AI</h1>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <span className="text-sm opacity-75">👤 {user.name}</span>
                                <button
                                    onClick={handleLogout}
                                    className="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-sm font-semibold transition-colors"
                                >
                                    Logout
                                </button>
                            </div>
                        </div>
                    </nav>

                    <div className="flex">
                        <aside className="w-64 bg-white shadow-lg min-h-screen">
                            <nav className="p-4">
                                <MenuItem
                                    icon="📊"
                                    label="Dashboard"
                                    active={currentView === 'dashboard'}
                                    onClick={() => setCurrentView('dashboard')}
                                />
                                <MenuItem
                                    icon="📋"
                                    label="All Leads"
                                    active={currentView === 'leads'}
                                    onClick={() => setCurrentView('leads')}
                                    badge={leads.length}
                                />
                                <MenuItem
                                    icon="📞"
                                    label="Call Queue"
                                    active={currentView === 'calls'}
                                    onClick={() => setCurrentView('calls')}
                                />
                                <MenuItem
                                    icon="📅"
                                    label="Appointments"
                                    active={currentView === 'appointments'}
                                    onClick={() => setCurrentView('appointments')}
                                />
                                <MenuItem
                                    icon="📈"
                                    label="Reports"
                                    active={currentView === 'reports'}
                                    onClick={() => setCurrentView('reports')}
                                />
                            </nav>
                        </aside>

                        <main className="flex-1 p-8">
                            {currentView === 'dashboard' && <Dashboard leads={leads} onViewLead={(lead) => {setSelectedLead(lead); setShowLeadModal(true);}} />}
                            {currentView === 'leads' && <LeadsView leads={leads} onViewLead={(lead) => {setSelectedLead(lead); setShowLeadModal(true);}} />}
                            {currentView === 'calls' && <CallQueue leads={leads.filter(l => l.status === 'new')} />}
                            {currentView === 'appointments' && <Appointments leads={leads.filter(l => l.status === 'appointment_set')} />}
                            {currentView === 'reports' && <Reports leads={leads} />}
                        </main>
                    </div>

                    {showLeadModal && selectedLead && (
                        <LeadModal 
                            lead={selectedLead} 
                            onClose={() => setShowLeadModal(false)}
                            onUpdateStatus={(newStatus) => {
                                setLeads(leads.map(l => l.id === selectedLead.id ? {...l, status: newStatus} : l));
                                setShowLeadModal(false);
                            }}
                        />
                    )}
                </div>
            );
        }

        // Login Screen
        function LoginScreen({ onLogin }) {
            const [username, setUsername] = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = (e) => {
                e.preventDefault();
                const userData = { name: username || 'Demo User', role: 'BDC Agent' };
                const token = 'demo-token-' + Date.now();
                onLogin(userData, token);
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-900 to-blue-700 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-md">
                        <div className="text-center mb-8">
                            <span className="text-6xl">📞</span>
                            <h1 className="text-3xl font-bold text-gray-900 mt-4">AutoBDC AI</h1>
                            <p className="text-gray-600 mt-2">Lead Response Automation</p>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Username</label>
                                <input
                                    type="text"
                                    value={username}
                                    onChange={(e) => setUsername(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                    placeholder="Enter username"
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-2">Password</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    className="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500"
                                    placeholder="Enter password"
                                />
                            </div>
                            <button
                                type="submit"
                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-lg transition-colors"
                            >
                                Login to AutoBDC
                            </button>
                        </form>
                        <p className="text-center text-sm text-gray-500 mt-6">
                            Demo Mode - Enter any credentials
                        </p>
                    </div>
                </div>
            );
        }

        // Menu Item Component
        function MenuItem({ icon, label, active, onClick, badge }) {
            return (
                <button
                    onClick={onClick}
                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-lg transition-colors mb-2 ${
                        active ? 'bg-blue-600 text-white' : 'text-gray-700 hover:bg-gray-100'
                    }`}
                >
                    <span className="text-xl">{icon}</span>
                    <span className="font-medium flex-1 text-left">{label}</span>
                    {badge && (
                        <span className={`px-2 py-1 rounded-full text-xs font-semibold ${
                            active ? 'bg-white text-blue-600' : 'bg-blue-100 text-blue-600'
                        }`}>
                            {badge}
                        </span>
                    )}
                </button>
            );
        }

        // Dashboard View
        function Dashboard({ leads, onViewLead }) {
            const stats = {
                totalLeads: leads.length,
                newLeads: leads.filter(l => l.status === 'new').length,
                contacted: leads.filter(l => l.status === 'contacted').length,
                appointments: leads.filter(l => l.status === 'appointment_set').length,
                avgResponseTime: '42s'
            };

            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Dashboard</h1>
                    
                    <div className="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8">
                        <StatCard title="Today's Leads" value={stats.totalLeads} subtitle="+12 from yesterday" color="blue" />
                        <StatCard title="Appointments Set" value={stats.appointments} subtitle="25.5% conversion" color="green" />
                        <StatCard title="Avg Response" value={stats.avgResponseTime} subtitle="Target: < 60s" color="purple" />
                        <StatCard title="Follow-ups Due" value="8" subtitle="Next in 15 min" color="yellow" />
                    </div>

                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <h2 className="text-xl font-bold text-gray-900 mb-6">Recent Leads</h2>
                        <div className="space-y-4">
                            {leads.slice(0, 5).map(lead => (
                                <div 
                                    key={lead.id}
                                    onClick={() => onViewLead(lead)}
                                    className="flex items-center justify-between p-4 bg-gray-50 rounded-lg hover:bg-gray-100 cursor-pointer transition"
                                >
                                    <div className="flex items-center gap-4">
                                        <div className="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center text-2xl">
                                            👤
                                        </div>
                                        <div>
                                            <p className="font-semibold text-gray-900">{lead.name}</p>
                                            <p className="text-sm text-gray-600">{lead.interest}</p>
                                            <p className="text-xs text-gray-500">{lead.source} • {lead.lastContact}</p>
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <span className={`status-badge status-${lead.status}`}>
                                            {lead.status.replace('_', ' ')}
                                        </span>
                                        <span className="text-blue-600 font-medium">View →</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // Leads View
        function LeadsView({ leads, onViewLead }) {
            const [filter, setFilter] = useState('all');
            const [search, setSearch] = useState('');

            const filteredLeads = leads.filter(lead => {
                const matchesFilter = filter === 'all' || lead.status === filter;
                const matchesSearch = lead.name.toLowerCase().includes(search.toLowerCase()) ||
                                     lead.interest.toLowerCase().includes(search.toLowerCase());
                return matchesFilter && matchesSearch;
            });

            return (
                <div>
                    <div className="flex items-center justify-between mb-8">
                        <h1 className="text-3xl font-bold text-gray-900">All Leads</h1>
                        <button className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold transition">
                            + New Lead
                        </button>
                    </div>

                    <div className="bg-white rounded-xl shadow-lg p-4 mb-6">
                        <div className="flex gap-4">
                            <select 
                                value={filter}
                                onChange={(e) => setFilter(e.target.value)}
                                className="px-4 py-2 border border-gray-300 rounded-lg"
                            >
                                <option value="all">All Leads</option>
                                <option value="new">New</option>
                                <option value="contacted">Contacted</option>
                                <option value="appointment_set">Appointment Set</option>
                            </select>
                            <input 
                                type="search"
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                                placeholder="Search leads..."
                                className="flex-1 px-4 py-2 border border-gray-300 rounded-lg"
                            />
                        </div>
                    </div>

                    <div className="bg-white rounded-xl shadow-lg overflow-hidden">
                        <table className="w-full">
                            <thead className="bg-gray-50 border-b">
                                <tr>
                                    <th className="px-6 py-4 text-left text-sm font-semibold text-gray-700">Customer</th>
                                    <th className="px-6 py-4 text-left text-sm font-semibold text-gray-700">Source</th>
                                    <th className="px-6 py-4 text-left text-sm font-semibold text-gray-700">Interest</th>
                                    <th className="px-6 py-4 text-left text-sm font-semibold text-gray-700">Status</th>
                                    <th className="px-6 py-4 text-left text-sm font-semibold text-gray-700">Last Contact</th>
                                    <th className="px-6 py-4 text-left text-sm font-semibold text-gray-700">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y divide-gray-200">
                                {filteredLeads.map(lead => (
                                    <tr key={lead.id} onClick={() => onViewLead(lead)} className="hover:bg-gray-50 cursor-pointer">
                                        <td className="px-6 py-4">
                                            <p className="font-semibold text-gray-900">{lead.name}</p>
                                            <p className="text-sm text-gray-500">{lead.email}</p>
                                        </td>
                                        <td className="px-6 py-4">
                                            <span className="px-2 py-1 bg-blue-100 text-blue-800 rounded text-xs font-semibold">
                                                {lead.source}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4 text-gray-900">{lead.interest}</td>
                                        <td className="px-6 py-4">
                                            <span className={`status-badge status-${lead.status}`}>
                                                {lead.status.replace('_', ' ')}
                                            </span>
                                        </td>
                                        <td className="px-6 py-4 text-gray-600">{lead.lastContact}</td>
                                        <td className="px-6 py-4">
                                            <button className="text-blue-600 hover:text-blue-800 font-semibold text-sm">
                                                View →
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        // Lead Modal
        function LeadModal({ lead, onClose, onUpdateStatus }) {
            const [newMessage, setNewMessage] = useState('');

            return (
                <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-2xl shadow-2xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
                        <div className="p-6">
                            <div className="flex items-center justify-between mb-6">
                                <div>
                                    <h2 className="text-2xl font-bold text-gray-900">{lead.name}</h2>
                                    <p className="text-gray-600">{lead.interest}</p>
                                </div>
                                <button onClick={onClose} className="text-gray-400 hover:text-gray-600 text-3xl">×</button>
                            </div>

                            <div className="grid grid-cols-2 gap-6 mb-6">
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-sm text-gray-600">Email</label>
                                        <p className="font-medium">{lead.email}</p>
                                    </div>
                                    <div>
                                        <label className="text-sm text-gray-600">Phone</label>
                                        <p className="font-medium">{lead.phone}</p>
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <div>
                                        <label className="text-sm text-gray-600">Source</label>
                                        <p className="font-medium">{lead.source}</p>
                                    </div>
                                    <div>
                                        <label className="text-sm text-gray-600">Status</label>
                                        <span className={`status-badge status-${lead.status}`}>
                                            {lead.status.replace('_', ' ')}
                                        </span>
                                    </div>
                                </div>
                            </div>

                            <div className="mb-6">
                                <label className="text-sm text-gray-600 mb-2 block">Notes</label>
                                <div className="bg-gray-50 p-4 rounded-lg">
                                    <p className="text-gray-900">{lead.notes}</p>
                                </div>
                            </div>

                            <div className="mb-6">
                                <h3 className="text-lg font-bold text-gray-900 mb-4">Conversation History</h3>
                                <div className="space-y-3 mb-4 max-h-96 overflow-y-auto">
                                    {lead.conversation.length > 0 ? (
                                        lead.conversation.map((msg, idx) => (
                                            <div 
                                                key={idx}
                                                className={`p-4 rounded-lg ${
                                                    msg.sender === 'customer' ? 'bg-gray-100' : 'bg-blue-50'
                                                }`}
                                            >
                                                <div className="text-xs text-gray-600 mb-1">
                                                    {msg.sender === 'customer' ? 'Customer' : 'AutoBDC AI'} • {msg.time}
                                                </div>
                                                <p className="text-gray-900">{msg.message}</p>
                                            </div>
                                        ))
                                    ) : (
                                        <div className="text-center text-gray-500 py-8">No conversation yet</div>
                                    )}
                                </div>

                                <div className="flex gap-2">
                                    <input 
                                        type="text"
                                        value={newMessage}
                                        onChange={(e) => setNewMessage(e.target.value)}
                                        placeholder="Type a message..."
                                        className="flex-1 px-4 py-2 border border-gray-300 rounded-lg"
                                    />
                                    <button 
                                        onClick={() => {
                                            if (newMessage.trim()) {
                                                alert('Message sent: ' + newMessage);
                                                setNewMessage('');
                                            }
                                        }}
                                        className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold"
                                    >
                                        Send
                                    </button>
                                </div>
                            </div>

                            <div className="flex gap-3 pt-6 border-t">
                                <button className="flex-1 bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg font-semibold">
                                    📞 Call
                                </button>
                                <button className="flex-1 bg-green-600 hover:bg-green-700 text-white px-4 py-3 rounded-lg font-semibold">
                                    📧 Email
                                </button>
                                <button 
                                    onClick={() => onUpdateStatus('appointment_set')}
                                    className="flex-1 bg-purple-600 hover:bg-purple-700 text-white px-4 py-3 rounded-lg font-semibold"
                                >
                                    📅 Schedule
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Call Queue View
        function CallQueue({ leads }) {
            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Call Queue</h1>
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <div className="space-y-4">
                            {leads.map(lead => (
                                <div key={lead.id} className="flex items-center justify-between p-4 border border-gray-200 rounded-lg">
                                    <div>
                                        <p className="font-semibold text-gray-900">{lead.name}</p>
                                        <p className="text-sm text-gray-600">{lead.phone}</p>
                                        <p className="text-xs text-gray-500">{lead.interest}</p>
                                    </div>
                                    <button className="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold">
                                        📞 Call Now
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // Appointments View
        function Appointments({ leads }) {
            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Scheduled Appointments</h1>
                    <div className="bg-white rounded-xl shadow-lg p-6">
                        <div className="space-y-4">
                            {leads.map(lead => (
                                <div key={lead.id} className="p-4 border border-gray-200 rounded-lg">
                                    <div className="flex justify-between mb-2">
                                        <p className="font-semibold text-gray-900">{lead.name}</p>
                                        <span className="px-3 py-1 bg-green-100 text-green-800 rounded-full text-sm font-semibold">
                                            Confirmed
                                        </span>
                                    </div>
                                    <p className="text-sm text-gray-600">{lead.interest}</p>
                                    <p className="text-sm text-gray-500 mt-2">📅 {lead.notes}</p>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // Reports View
        function Reports({ leads }) {
            const stats = {
                total: leads.length,
                conversion: '25.5%',
                response: '42s',
                appointments: leads.filter(l => l.status === 'appointment_set').length
            };

            return (
                <div>
                    <h1 className="text-3xl font-bold text-gray-900 mb-8">Reports & Analytics</h1>
                    <div className="grid grid-cols-2 gap-6">
                        <div className="bg-white rounded-xl shadow-lg p-6">
                            <h3 className="text-lg font-bold mb-4">Performance Metrics</h3>
                            <div className="space-y-4">
                                <MetricRow label="Total Leads" value={stats.total} />
                                <MetricRow label="Conversion Rate" value={stats.conversion} />
                                <MetricRow label="Avg Response Time" value={stats.response} />
                                <MetricRow label="Appointments Set" value={stats.appointments} />
                            </div>
                        </div>
                        <div className="bg-white rounded-xl shadow-lg p-6">
                            <h3 className="text-lg font-bold mb-4">Lead Sources</h3>
                            <div className="space-y-4">
                                <MetricRow label="Website" value="45%" />
                                <MetricRow label="Phone" value="25%" />
                                <MetricRow label="Social Media" value="20%" />
                                <MetricRow label="Other" value="10%" />
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // Helper Components
        function StatCard({ title, value, subtitle, color }) {
            const colors = {
                blue: 'from-blue-500 to-blue-600',
                green: 'from-green-500 to-green-600',
                purple: 'from-purple-500 to-purple-600',
                yellow: 'from-yellow-500 to-yellow-600'
            };

            return (
                <div className={`bg-gradient-to-br ${colors[color]} text-white rounded-xl shadow-lg p-6`}>
                    <p className="text-sm opacity-90 mb-2">{title}</p>
                    <p className="text-3xl font-bold mb-1">{value}</p>
                    <p className="text-sm opacity-75">{subtitle}</p>
                </div>
            );
        }

        function MetricRow({ label, value }) {
            return (
                <div className="flex justify-between">
                    <span className="text-gray-600">{label}</span>
                    <span className="font-semibold text-gray-900">{value}</span>
                </div>
            );
        }

        // Render
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
