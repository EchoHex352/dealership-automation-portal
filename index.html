<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DealerOS - Complete Automation Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const PLATFORMS = [
            { id: 1, name: "BDC Agent", port: 8000, icon: "📞", color: "blue", status: "✅ Built" },
            { id: 2, name: "Reconditioning", port: 8001, icon: "🔧", color: "green", status: "✅ Built" },
            { id: 3, name: "Internet Sales", port: 8100, icon: "💻", color: "purple", status: "✅ Built" },
            { id: 4, name: "Service Appointments", port: 8200, icon: "📅", color: "cyan", status: "✅ Built" },
            { id: 5, name: "Equity Mining", port: 8300, icon: "💰", color: "yellow", status: "✅ Built" },
            { id: 6, name: "Lost Sales Follow-Up", port: 8400, icon: "🔄", color: "orange", status: "✅ Built" },
            { id: 7, name: "Warranty Admin", port: 8500, icon: "📋", color: "red", status: "✅ Built" },
            { id: 8, name: "Title Clerk", port: 8600, icon: "📄", color: "indigo", status: "✅ Built" },
            { id: 9, name: "AR Specialist", port: 8700, icon: "💵", color: "pink", status: "✅ Built" },
            { id: 10, name: "Parts Counter", port: 8800, icon: "⚙️", color: "teal", status: "✅ Built" },
            { id: 11, name: "F&I Processor", port: 8900, icon: "🏦", color: "lime", status: "✅ Built" },
            { id: 12, name: "Inventory Manager", port: 9000, icon: "📊", color: "amber", status: "✅ Built" },
            { id: 13, name: "Sales Desk", port: 9100, icon: "🎯", color: "rose", status: "✅ Built" }
        ];

        function App() {
            const [selectedPlatform, setSelectedPlatform] = useState(null);
            const [platformStatus, setPlatformStatus] = useState({});

            const checkPlatformStatus = async (platform) => {
                try {
                    const response = await axios.get(`http://localhost:${platform.port}/`);
                    setPlatformStatus(prev => ({
                        ...prev,
                        [platform.id]: { status: 'online', data: response.data }
                    }));
                } catch (error) {
                    setPlatformStatus(prev => ({
                        ...prev,
                        [platform.id]: { status: 'offline', error: error.message }
                    }));
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-gray-900">
                    {/* Header */}
                    <header className="bg-black/50 backdrop-blur-lg border-b border-white/10">
                        <div className="max-w-7xl mx-auto px-6 py-4">
                            <div className="flex items-center justify-between">
                                <div>
                                    <h1 className="text-3xl font-bold text-white">DealerOS</h1>
                                    <p className="text-gray-400 text-sm">Complete Dealership Automation Suite</p>
                                </div>
                                <div className="text-right">
                                    <div className="text-2xl font-bold text-green-400">{PLATFORMS.length} Platforms</div>
                                    <div className="text-sm text-gray-400">All Systems Operational</div>
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="max-w-7xl mx-auto px-6 py-8">
                        {/* Stats Overview */}
                        <div className="grid grid-cols-4 gap-6 mb-8">
                            <StatCard icon="🚀" label="Total Platforms" value={PLATFORMS.length} color="blue" />
                            <StatCard icon="⚡" label="API Endpoints" value="80+" color="green" />
                            <StatCard icon="💾" label="Database Tables" value="100+" color="purple" />
                            <StatCard icon="💰" label="Market TAM" value="$8.5B" color="yellow" />
                        </div>

                        {/* Platform Grid */}
                        <div className="mb-8">
                            <h2 className="text-2xl font-bold text-white mb-4">All Platforms</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                {PLATFORMS.map(platform => (
                                    <PlatformCard
                                        key={platform.id}
                                        platform={platform}
                                        onClick={() => {
                                            setSelectedPlatform(platform);
                                            checkPlatformStatus(platform);
                                        }}
                                        status={platformStatus[platform.id]}
                                    />
                                ))}
                            </div>
                        </div>

                        {/* Platform Details */}
                        {selectedPlatform && (
                            <div className="bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10 p-6">
                                <div className="flex items-center justify-between mb-4">
                                    <div className="flex items-center gap-3">
                                        <span className="text-4xl">{selectedPlatform.icon}</span>
                                        <div>
                                            <h3 className="text-2xl font-bold text-white">{selectedPlatform.name}</h3>
                                            <p className="text-gray-400">Port: {selectedPlatform.port}</p>
                                        </div>
                                    </div>
                                    <button
                                        onClick={() => setSelectedPlatform(null)}
                                        className="text-gray-400 hover:text-white"
                                    >
                                        ✕ Close
                                    </button>
                                </div>

                                {platformStatus[selectedPlatform.id] && (
                                    <div className="mt-4">
                                        {platformStatus[selectedPlatform.id].status === 'online' ? (
                                            <div className="bg-green-500/20 border border-green-500/50 rounded-lg p-4">
                                                <div className="text-green-400 font-semibold mb-2">✓ Platform Online</div>
                                                <pre className="text-sm text-gray-300 overflow-auto">
                                                    {JSON.stringify(platformStatus[selectedPlatform.id].data, null, 2)}
                                                </pre>
                                                <div className="mt-4">
                                                    <a
                                                        href={`http://localhost:${selectedPlatform.port}/docs`}
                                                        target="_blank"
                                                        className="inline-block bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg"
                                                    >
                                                        View API Documentation →
                                                    </a>
                                                </div>
                                            </div>
                                        ) : (
                                            <div className="bg-red-500/20 border border-red-500/50 rounded-lg p-4">
                                                <div className="text-red-400 font-semibold mb-2">✗ Platform Offline</div>
                                                <p className="text-gray-400 text-sm">
                                                    Start the platform with:<br/>
                                                    <code className="bg-black/50 px-2 py-1 rounded mt-2 inline-block">
                                                        cd {selectedPlatform.name.toLowerCase().replace(/ /g, '-')}/backend && uvicorn main:app --port {selectedPlatform.port}
                                                    </code>
                                                </p>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* Quick Start Guide */}
                        <div className="mt-8 bg-white/5 backdrop-blur-lg rounded-2xl border border-white/10 p-6">
                            <h3 className="text-xl font-bold text-white mb-4">🚀 Quick Start</h3>
                            <div className="space-y-3 text-gray-300">
                                <div className="flex items-start gap-3">
                                    <span className="text-green-400 font-bold">1.</span>
                                    <div>
                                        <p className="font-semibold">Start Any Platform</p>
                                        <code className="text-sm bg-black/50 px-2 py-1 rounded block mt-1">
                                            cd [platform-name]/backend && uvicorn main:app --port [PORT]
                                        </code>
                                    </div>
                                </div>
                                <div className="flex items-start gap-3">
                                    <span className="text-green-400 font-bold">2.</span>
                                    <div>
                                        <p className="font-semibold">View API Documentation</p>
                                        <p className="text-sm text-gray-400">Navigate to http://localhost:[PORT]/docs</p>
                                    </div>
                                </div>
                                <div className="flex items-start gap-3">
                                    <span className="text-green-400 font-bold">3.</span>
                                    <div>
                                        <p className="font-semibold">Test Endpoints</p>
                                        <p className="text-sm text-gray-400">Use the interactive API docs to test each endpoint</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        function StatCard({ icon, label, value, color }) {
            const colors = {
                blue: 'from-blue-600 to-blue-800',
                green: 'from-green-600 to-green-800',
                purple: 'from-purple-600 to-purple-800',
                yellow: 'from-yellow-600 to-yellow-800'
            };

            return (
                <div className={`bg-gradient-to-br ${colors[color]} rounded-xl p-6 border border-white/20`}>
                    <div className="text-4xl mb-2">{icon}</div>
                    <div className="text-3xl font-bold text-white">{value}</div>
                    <div className="text-sm text-white/70">{label}</div>
                </div>
            );
        }

        function PlatformCard({ platform, onClick, status }) {
            const colors = {
                blue: 'from-blue-600/20 to-blue-800/20 border-blue-500/30',
                green: 'from-green-600/20 to-green-800/20 border-green-500/30',
                purple: 'from-purple-600/20 to-purple-800/20 border-purple-500/30',
                cyan: 'from-cyan-600/20 to-cyan-800/20 border-cyan-500/30',
                yellow: 'from-yellow-600/20 to-yellow-800/20 border-yellow-500/30',
                orange: 'from-orange-600/20 to-orange-800/20 border-orange-500/30',
                red: 'from-red-600/20 to-red-800/20 border-red-500/30',
                indigo: 'from-indigo-600/20 to-indigo-800/20 border-indigo-500/30',
                pink: 'from-pink-600/20 to-pink-800/20 border-pink-500/30',
                teal: 'from-teal-600/20 to-teal-800/20 border-teal-500/30',
                lime: 'from-lime-600/20 to-lime-800/20 border-lime-500/30',
                amber: 'from-amber-600/20 to-amber-800/20 border-amber-500/30',
                rose: 'from-rose-600/20 to-rose-800/20 border-rose-500/30'
            };

            return (
                <button
                    onClick={onClick}
                    className={`bg-gradient-to-br ${colors[platform.color]} border rounded-xl p-4 text-left hover:scale-105 transition-transform`}
                >
                    <div className="text-3xl mb-2">{platform.icon}</div>
                    <div className="text-white font-semibold mb-1">{platform.name}</div>
                    <div className="text-xs text-gray-400">Port {platform.port}</div>
                    <div className="text-xs text-green-400 mt-2">{platform.status}</div>
                    {status && (
                        <div className={`text-xs mt-2 ${status.status === 'online' ? 'text-green-400' : 'text-red-400'}`}>
                            {status.status === 'online' ? '● Online' : '○ Offline'}
                        </div>
                    )}
                </button>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
